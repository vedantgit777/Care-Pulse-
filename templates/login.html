<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title> Login | Care Pulse  </title>
  <style>
    body { margin: 0; font-family: Inter, system-ui, sans-serif; background: #eef1f6; color: #0f1923; }
    .page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .card { width: 100%; max-width: 420px; background: #ffffff; border: 1px solid rgba(15,25,35,0.08); border-radius: 18px; box-shadow: 0 18px 50px rgba(15,25,35,0.08); padding: 32px; }
    .brand { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
    .brand-icon { width: 38px; height: 38px; border-radius: 12px; background: #e6f1fb; display: grid; place-items: center; border: 1px solid #b5d4f4; }
    .brand-name { font-size: 22px; font-weight: 700; }
    .brand-sub { font-size: 13px; color: #5a6a7e; margin-top: 2px; }
    h1 { font-size: 28px; margin-bottom: 10px; }
    p { margin: 0 0 22px; color: #5a6a7e; line-height: 1.6; }
    label { display: block; margin-bottom: 8px; font-size: 13px; color: #5a6a7e; }
    input[type="email"] { width: 100%; padding: 14px 16px; border: 1px solid rgba(15,25,35,0.14); border-radius: 12px; font-size: 15px; margin-bottom: 18px; }
    .btn { width: 100%; padding: 14px 16px; border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; background: #185fa5; color: white; }
    .hint { font-size: 13px; color: #8fa0b4; margin-top: 18px; }
    .error { background: #fdecea; color: #a32d2d; border: 1px solid #f5c4c4; border-radius: 12px; padding: 12px 14px; margin-bottom: 18px; }
  </style>
</head>
<body>
  <div class="page">
    <div class="card">
      <div class="brand">
        <div class="brand-icon">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#185fa5" stroke-width="1.5">
            <path d="M12 2C7 2 3 6 3 11c0 3 1.5 5.5 4 7l1 2h8l1-2c2.5-1.5 4-4 4-7 0-5-4-9-9-9z"/>
            <path d="M9 10c0 0 1-2 3-2s3 2 3 2" stroke-linecap="round"/>
            <line x1="8" y1="13" x2="16" y2="13" stroke-linecap="round"/>
          </svg>
        </div>
        <div>
          <div class="brand-name">Care Pulse</div>
          <div class="brand-sub">Alzheimer's Detection System</div>
        </div>
      </div>
      <h1>Login</h1>
      <p>Enter your authorized email to access the neuroimaging dashboard.</p>
      {% if error %}
      <div class="error">{{ error }}</div>
      {% endif %}
      <form action="{{ url_for('login') }}" method="post">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required autofocus />
        <button type="submit" class="btn">Sign in</button>
      </form>
      <div class="hint">Authorized login: vedantbhagwani@gmail.com</div>
    </div>
  </div>
</body>
</html>
