<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Care Pulse</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #f0f4fa;
      --card:      #ffffff;
      --border:    rgba(15,25,35,0.09);
      --primary:   #185fa5;
      --primary-h: #0f4880;
      --text:      #0f1923;
      --muted:     #5e7288;
      --error-bg:  #fef2f2;
      --error-bd:  #fecaca;
      --error-tx:  #b91c1c;
      --admin-bg:  #f8faff;
      --admin-bd:  #c7d9f5;
      --admin-tx:  #1e3a5f;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background-image:
        radial-gradient(circle at 20% 20%, rgba(24,95,165,0.07) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(24,95,165,0.05) 0%, transparent 50%);
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(15,25,35,0.09), 0 4px 16px rgba(15,25,35,0.05);
      padding: 36px 32px 28px;
      animation: fadeUp 0.5s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Brand ── */
    .brand {
      display: flex;
      align-items: center;
      gap: 13px;
      margin-bottom: 28px;
    }
    .brand-icon {
      width: 42px; height: 42px;
      border-radius: 12px;
      background: linear-gradient(135deg, #e8f0fc 0%, #daeaf9 100%);
      border: 1px solid var(--admin-bd);
      display: grid; place-items: center;
      flex-shrink: 0;
    }
    .brand-name { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
    .brand-sub  { font-size: 12px; color: var(--muted); margin-top: 2px; }

    /* ── Heading ── */
    .heading { font-family: 'DM Serif Display', serif; font-size: 28px; margin-bottom: 6px; }
    .subhead  { font-size: 14px; color: var(--muted); margin-bottom: 24px; line-height: 1.55; }

    /* ── Error ── */
    .error {
      background: var(--error-bg);
      border: 1px solid var(--error-bd);
      color: var(--error-tx);
      border-radius: 10px;
      padding: 11px 14px;
      font-size: 13.5px;
      margin-bottom: 18px;
      display: flex; align-items: center; gap: 8px;
    }

    /* ── Form ── */
    label {
      display: block;
      font-size: 12.5px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 7px;
    }
    input[type="email"] {
      width: 100%;
      padding: 13px 15px;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      font-size: 15px;
      font-family: inherit;
      color: var(--text);
      background: #fafbfd;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
      margin-bottom: 18px;
    }
    input[type="email"]:focus {
      border-color: var(--primary);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(24,95,165,0.1);
    }

    /* ── Primary button ── */
    .btn-primary {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      background: var(--primary);
      color: #fff;
      letter-spacing: 0.1px;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 14px rgba(24,95,165,0.25);
    }
    .btn-primary:hover  { background: var(--primary-h); box-shadow: 0 6px 18px rgba(24,95,165,0.3); }
    .btn-primary:active { transform: scale(0.98); }

    /* ── Divider ── */
    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 22px 0;
    }
    .divider hr { flex: 1; border: none; border-top: 1px solid var(--border); }
    .divider span { font-size: 12px; color: var(--muted); white-space: nowrap; }

    /* ── Admin button ── */
    .btn-admin {
      width: 100%;
      padding: 13px;
      border: 1.5px solid var(--admin-bd);
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      background: var(--admin-bg);
      color: var(--admin-tx);
      display: flex; align-items: center; justify-content: center; gap: 9px;
      transition: background 0.2s, border-color 0.2s, box-shadow 0.2s;
      text-decoration: none;
    }
    .btn-admin:hover {
      background: #eef4fd;
      border-color: #a3c0ec;
      box-shadow: 0 3px 10px rgba(24,95,165,0.12);
    }
    .btn-admin svg { flex-shrink: 0; }

    .footer-note {
      font-size: 11.5px;
      color: #9aabb9;
      text-align: center;
      margin-top: 20px;
      line-height: 1.5;
    }
  </style>
</head>

<body>
  <div class="card">

    <!-- Brand -->
    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#185fa5" stroke-width="1.6">
          <path d="M12 2C7 2 3 6 3 11c0 3 1.5 5.5 4 7l1 2h8l1-2c2.5-1.5 4-4 4-7 0-5-4-9-9-9z"/>
          <path d="M9 10c0 0 1-2 3-2s3 2 3 2" stroke-linecap="round"/>
          <line x1="8" y1="13" x2="16" y2="13" stroke-linecap="round"/>
        </svg>
      </div>
      <div>
        <div class="brand-name">Care Pulse</div>
        <div class="brand-sub">Alzheimer's Detection &amp; Prevention System</div>
      </div>
    </div>

    <!-- Heading -->
    <h1 class="heading">Welcome back</h1>
    <p class="subhead">Enter your authorized email to access the dashboard.</p>

    <!-- Error -->
    {% if error %}
    <div class="error">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      {{ error }}
    </div>
    {% endif %}

    <!-- User login form -->
    <form action="{{ url_for('login') }}" method="post">
      <label for="email">Email address</label>
      <input type="email" id="email" name="email" placeholder="you@example.com" required autofocus />
      <button type="submit" class="btn-primary">Sign In</button>
    </form>

    <!-- Divider -->
    <div class="divider">
      <hr />
      <span>or access as</span>
      <hr />
    </div>

    <!-- Admin login button -->
    <a href="{{ url_for('admin_login') }}" class="btn-admin">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
      </svg>
      Admin Portal
    </a>

    <p class="footer-note">Access is restricted to authorized personnel only.</p>
  </div>
</body>
</html>
