<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Care Pulse</title>

  <style>
    body {
      margin: 0;
      font-family: Inter, system-ui, sans-serif;
      background: #eef1f6;
      color: #0f1923;
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: #ffffff;
      border: 1px solid rgba(15,25,35,0.08);
      border-radius: 18px;
      box-shadow: 0 18px 50px rgba(15,25,35,0.08);
      padding: 32px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }

    .brand-icon {
      width: 38px;
      height: 38px;
      border-radius: 12px;
      background: #e6f1fb;
      display: grid;
      place-items: center;
      border: 1px solid #b5d4f4;
    }

    .brand-name {
      font-size: 22px;
      font-weight: 700;
    }

    .brand-sub {
      font-size: 13px;
      color: #5a6a7e;
    }

    h1 {
      font-size: 26px;
      margin-bottom: 8px;
    }

    p {
      margin: 0 0 20px;
      color: #5a6a7e;
      line-height: 1.5;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      color: #5a6a7e;
    }

    input[type="email"] {
      width: 100%;
      padding: 14px;
      border: 1px solid rgba(15,25,35,0.14);
      border-radius: 12px;
      font-size: 15px;
      margin-bottom: 16px;
      outline: none;
    }

    input[type="email"]:focus {
      border-color: #185fa5;
      box-shadow: 0 0 0 2px rgba(24,95,165,0.1);
    }

    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      background: #185fa5;
      color: white;
      transition: 0.2s;
    }

    .btn:hover {
      background: #134c85;
    }

    .hint {
      font-size: 12px;
      color: #8fa0b4;
      margin-top: 18px;
      line-height: 1.5;
    }

    .error {
      background: #fdecea;
      color: #a32d2d;
      border: 1px solid #f5c4c4;
      border-radius: 10px;
      padding: 10px;
      margin-bottom: 15px;
      font-size: 14px;
    }
  </style>
</head>

<body>
  <div class="page">
    <div class="card">

      <!-- Brand -->
      <div class="brand">
        <div class="brand-icon">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#185fa5" stroke-width="1.5">
            <path d="M12 2C7 2 3 6 3 11c0 3 1.5 5.5 4 7l1 2h8l1-2c2.5-1.5 4-4 4-7 0-5-4-9-9-9z"/>
            <path d="M9 10c0 0 1-2 3-2s3 2 3 2" stroke-linecap="round"/>
            <line x1="8" y1="13" x2="16" y2="13" stroke-linecap="round"/>
          </svg>
        </div>
        <div>
          <div class="brand-name">Care Pulse</div>
          <div class="brand-sub">Alzheimer's Detection & Prevention System</div>
        </div>
      </div>

      <!-- Title -->
      <h1>Login</h1>
      <p>Enter your authorized email to access the dashboard.</p>

      <!-- Error -->
      {% if error %}
      <div class="error">{{ error }}</div>
      {% endif %}

      <!-- Form -->
      <form action="{{ url_for('login') }}" method="post">
        <label for="email">Email address</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required autofocus />
        <button type="submit" class="btn">Sign In</button>
      </form>

    

    </div>
  </div>
</body>
</html>
